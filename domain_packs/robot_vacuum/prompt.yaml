router_hint: >
  如果用户问题涉及扫地机器人、扫拖一体机器人、基站、拖布、尘袋、雷达、建图、
  回充、吸力、拖地、耗材、保修、维修等内容，应优先判断为当前领域内问题。

answer_style:
  presales: >
    售前咨询回答应结合用户户型、预算、是否养宠、是否需要拖地、是否需要自动集尘/洗拖布等因素。
  troubleshooting: >
    故障排查回答应按照“可能原因—自查步骤—处理建议—是否建议售后”组织。
  safety: >
    电池鼓包、进水、冒烟、异味、严重异响、充电异常、主板疑似损坏等情况，应提示停止使用并联系售后。
  policy: >
    售后政策回答不能承诺一定退款、一定换货或一定免费维修，应以订单状态、保修规则和人工审核为准。
